<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>

  <body>
    <main>
      <section>
        <picture>
          <img
            class="illustration-article"
            src="/assets/images/illustration-article.svg"
            alt=""
            aria-hidden="true"
          />
        </picture>
        <p class="tag">Learning</p>
        <p class="published_date">Published 21 Dec 2023</p>
        <h1>HTML & CSS foundations</h1>
        <p class="content">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="author">
          <img
            src="/assets/images/image-avatar.webp"
            alt="author-image-greg_hooper"
            class="image-avatar"
          />
          <p class="author_name">Greg Hooper</p>
        </div>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/earavichandran">@earavichandran</a>.
    </footer>
  </body>
</html>
